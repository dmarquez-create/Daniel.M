function Loader2({size=16,className=""}){return <span className={`spinner ${className}`} style={{width:size,height:size}}/>;}const COLUMN_SYNONYMS = {

function normalizeKey(k){return k.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");}
function buildHeaderMap(rawHeaders){
  const normalized=rawHeaders.filter(h=>h!==null&&h!==undefined).map(h=>({original:h,norm:normalizeKey(h)}));
  const map={};
  Object.entries(COLUMN_SYNONYMS).forEach(([canonical,syns])=>{
    const match=normalized.find(h=>syns.includes(h.norm));
    if(match)map[canonical]=match.original;
  });
  return map;
}
function pickAgendaSheet(workbook){
  const candidate=workbook.SheetNames.find(n=>normalizeKey(n).includes("agenda"));
  return candidate||workbook.SheetNames[0];
}
function excelSerialToDate(n){return new Date(Math.round((n-25569)*86400*1000));}
function parseDateValue(val){
  if(val instanceof Date&&!isNaN(val))return val;
  if(typeof val==="number"){const d=excelSerialToDate(val);return isNaN(d)?null:d;}
  if(typeof val==="string"){
    const trimmed=val.trim();
    const m=trimmed.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if(m){const[,a,b,y]=m;const d=new Date(`${y.length===2?"20"+y:y}-${b.padStart(2,"0")}-${a.padStart(2,"0")}`);if(!isNaN(d))return d;}
    const d=new Date(trimmed);if(!isNaN(d))return d;
  }
  return null;
}
function daysBetween(a,b){return Math.round(Math.abs(b-a)/(1000*60*60*24));}
function cleanText(val,fallback){if(val===null||val===undefined)return fallback;const s=val.toString().trim().replace(/\s+/g," ");return s.length?s:fallback;}function processRows(rows){
  if(!rows.length)return{records:[],skipped:0};
  const headerMap=buildHeaderMap(Object.keys(rows[0]));
  let skipped=0;
  const records=rows.map(row=>{
    const fecha=headerMap.fecha?parseDateValue(row[headerMap.fecha]):null;
    const fechaAten=headerMap.fecha_atencion?parseDateValue(row[headerMap.fecha_atencion]):null;
    const tipoRaw=headerMap.tipo?normalizeKey(row[headerMap.tipo]||""):"";
    const estatusRaw=headerMap.estatus?normalizeKey(row[headerMap.estatus]||""):"";
    const tipo=tipoRaw==="instalacion"?"Instalación":tipoRaw==="ticket"?"Ticket":null;
    const estatus=estatusRaw==="realizado"?"Realizado":estatusRaw==="no_realizado"?"No realizado":null;
    if(!fecha||!tipo||!estatus){skipped++;return null;}
    let dias_atencion=null;
    if(estatus==="Realizado"){
      const colVal=headerMap.dias_atencion_col?row[headerMap.dias_atencion_col]:null;
      if(colVal!==null&&colVal!==undefined&&String(colVal).trim()!==""){
        const n=parseFloat(colVal);if(!isNaN(n))dias_atencion=n;
      } else if(fechaAten){dias_atencion=daysBetween(fecha,fechaAten);}
    }
    const motivo=cleanText(headerMap.motivo_no_realizado?row[headerMap.motivo_no_realizado]:null,null)||cleanText(headerMap.motivo_imposibilidad?row[headerMap.motivo_imposibilidad]:null,null);
    return{
      fecha:fecha.toISOString().slice(0,10),tipo,estatus,
      tecnico:cleanText(headerMap.tecnico?row[headerMap.tecnico]:null,"Sin asignar"),
      agente:cleanText(headerMap.agente?row[headerMap.agente]:null,"Sin asignar"),
      zona:cleanText(headerMap.zona?row[headerMap.zona]:null,"Sin zona"),
      motivo,dias_atencion
    };
  }).filter(Boolean).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  return{records,skipped};
}

function workingDaysInMonth(year,monthNum,throughDay){
  const daysInMonth=new Date(year,monthNum,0).getDate();
  const lastDay=throughDay?Math.min(throughDay,daysInMonth):daysInMonth;
  let total=0;
  for(let day=1;day<=lastDay;day++){const dow=new Date(year,monthNum-1,day).getDay();if(dow===0)continue;total+=dow===6?0.5:1;}
  return total;
}

function topCounts(items,keyFn,limit){

  },[filtered]);
  const tecnicoData=useMemo(()=>topCounts(filtered.filter(r=>r.estatus==="Realizado"),r=>r.tecnico,8),[filtered]);
  const motivoData=useMemo(()=>topCounts(filtered.filter(r=>r.estatus==="No realizado"&&r.motivo),r=>r.motivo,8),[filtered]);
return(
    <div className="app">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');
        :root{--ink:#F1F4F8;--surface:#FFFFFF;--surface-2:#E6ECF3;--border:#D7E0EA;--signal:#2256C9;--signal-soft:rgba(34,86,201,0.14);--amber:#F2780C;--critical:#D6453F;--text:#16233B;--text-muted:#57667C;--text-dim:#8997AB;}
        *{box-sizing:border-box;}
        .app{background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;min-height:100%;padding:28px 24px 60px;}
        .header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:8px;}
        .title-block{display:flex;flex-direction:column;gap:4px;}
        .eyebrow{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--signal);}
        .title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.01em;}
        .pulse-line{position:relative;height:2px;width:100%;background:var(--border);margin:16px 0 24px;overflow:hidden;border-radius:2px;}
        .pulse-line::after{content:'';position:absolute;top:-3px;left:-40px;width:40px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 14px 4px var(--signal-soft);}
        @media(prefers-reduced-motion:no-preference){.pulse-line::after{animation:travel 4.5s linear infinite;}}
        @keyframes travel{0%{left:-40px}100%{left:100%}}
        .actions{display:flex;gap:8px;flex-wrap:wrap;}
        .btn{display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:border-color .15s,background .15s;}
        .btn:hover{background:var(--surface-2);border-color:var(--signal);}
        .btn-primary{background:var(--signal);color:#FFF;border-color:var(--signal);font-weight:600;}
        .btn-primary:hover{opacity:.9;}
        .btn-ghost{background:transparent;color:var(--text-muted);}
        .btn-ghost:hover{color:var(--critical);border-color:var(--critical);background:transparent;}
        .btn[disabled]{opacity:.6;cursor:not-allowed;}
        .meta-row{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-dim);margin-bottom:20px;}
        .error-banner{display:flex;align-items:center;gap:8px;background:rgba(214,69,63,.08);border:1px solid var(--critical);color:#A4332E;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:20px;}
        .empty-state{border:1px dashed var(--border);border-radius:12px;padding:48px 24px;text-align:center;color:var(--text-muted);margin-top:24px;}
        .empty-state h3{font-family:'Space Grotesk',sans-serif;color:var(--text);font-size:17px;margin:12px 0 6px;}
        .empty-state p{font-size:13.5px;margin:0 0 18px;}
        .controls-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
        .toggle-group{display:flex;gap:10px;flex-wrap:wrap;}
        .range-toggle{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;}
        .range-btn{font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;}
        .range-btn.active{background:var(--signal-soft);color:var(--signal);font-weight:600;}
        .login-box{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:20px;}
        .login-box input{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;}
        .login-error{color:var(--critical);font-size:12px;}
        .scope-note{font-size:11.5px;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
        .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
        .kpi-icon{margin-bottom:10px;}
        .kpi-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;}
        .kpi-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;letter-spacing:-.01em;}
        .kpi-sub{margin-top:6px;font-size:12px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:14px;}
        .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 14px 8px;}
        .chart-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;margin-bottom:8px;padding-left:4px;}
        .spin{animation:spin .9s linear infinite;}
        .spinner{display:inline-block;border:2px solid rgba(0,0,0,.12);border-top-color:currentColor;border-radius:50%;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-screen{display:flex;align-items:center;justify-content:center;gap:10px;padding:80px 0;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:13px;}
        @media(max-width:560px){.app{padding:20px 14px 48px;}.title{font-size:21px;}}
      `}</style><div className="header">
        <div className="title-block">
          <div className="eyebrow"><Radio size={13}/> Operaciones · BD Agenda</div>
          <div className="title">Dashboard de Instalaciones y Tickets</div>
        </div>
        <div className="actions">
          <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
          <button className="btn" onClick={downloadTemplate}><Download size={14}/> Plantilla</button>
          {session?(
            <>
              <button className="btn btn-primary" disabled={importing} onClick={()=>fileInputRef.current?.click()}>
                {importing?<Loader2 size={14} className="spin"/>:<Upload size={14}/>}
                {importing?"Importando…":"Importar CSV / Excel"}
              </button>
              {data.length>0&&<button className="btn btn-ghost" onClick={handleClear}><Trash2 size={14}/> Borrar datos</button>}
              <button className="btn btn-ghost" onClick={handleLogout}>Cerrar sesión ({session.user.email})</button>
            </>
          ):!authLoading&&(
            <button className="btn" onClick={()=>setShowLogin(v=>!v)}>Iniciar sesión de administrador</button>
          )}
        </div>
      </div>
      {showLogin&&!session&&(
        <form className="login-box" onSubmit={handleLogin}>
          <input type="email" placeholder="Correo" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} required/>
          <input type="password" placeholder="Contraseña" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} required/>
          <button className="btn btn-primary" type="submit" disabled={loggingIn}>{loggingIn?"Entrando…":"Entrar"}</button>
          {loginError&&<span className="login-error">{loginError}</span>}
        </form>
      )}
      <div className="pulse-line"/>
      {meta&&(
        <div className="meta-row">
          {meta.filename?`Última importación: ${meta.filename} (hoja "${meta.sheet}") · `:"Datos cargados desde la base de datos compartida · "}
          {numFmt(meta.rowCount)} órdenes
          {meta.skipped?` · ${numFmt(meta.skipped)} filas omitidas`:""}
          {meta.importedAt?` · ${new Date(meta.importedAt).toLocaleString("es-MX")}`:""}
        </div>
      )}
      {error&&<div className="error-banner"><AlertCircle size={16}/> {error}</div>}{loadingData?(
        <div className="loading-screen"><Loader2 size={16} className="spin"/> Cargando datos compartidos…</div>
      ):data.length===0?(
        <div className="empty-state">
          <Wifi size={28} style={{color:"var(--text-dim)"}}/>
          <h3>Aún no hay órdenes cargadas</h3>
          <p>{session?"Importa tu archivo Excel.":"Pide a un administrador que importe el archivo."}</p>
          {session&&<button className="btn btn-primary" onClick={()=>fileInputRef.current?.click()}><Upload size={14}/> Importar archivo</button>}
        </div>
      ):(
        <>
          <div className="controls-row">
            <div className="toggle-group">
              <div className="range-toggle" role="group" aria-label="Mes">
                {MONTH_OPTIONS.map(opt=>(
                  <button key={opt.key} className={`range-btn${month===opt.key?" active":""}`} onClick={()=>setMonth(opt.key)}>{opt.label}</button>
                ))}
              </div>
              <div className="range-toggle" role="group" aria-label="Tipo de orden">
                {TIPO_OPTIONS.map(opt=>(
                  <button key={opt.key} className={`range-btn${tipoFilter===opt.key?" active":""}`} onClick={()=>setTipoFilter(opt.key)}>{opt.label}</button>
                ))}
              </div>
            </div>
            <div className="scope-note"><Users size={13}/> Datos compartidos en vivo</div>
          </div>
          {kpis&&(
            <div className="kpi-grid">
              <KpiCard icon={ClipboardList} label="Total de órdenes"
                value={tipoFilter==="todas"?numFmt(kpis.total):numFmt(kpis.totalRealizadas)}
                sub={tipoFilter==="todas"?`${numFmt(kpis.instalacionesTotal)} instalaciones · ${numFmt(kpis.ticketsTotal)} tickets`:`Realizadas · de ${numFmt(kpis.total)} ${tipoFilter==="Instalación"?"instalaciones":"tickets"}`}
                accent="var(--signal)"/>
              {(tipoFilter==="todas"||tipoFilter==="Instalación")&&(
                <KpiCard icon={CheckCircle2} label="Instalaciones completadas" value={`${kpis.instalacionesRate.toFixed(0)}%`} sub={`de ${numFmt(kpis.instalacionesTotal)} instalaciones`} accent="var(--signal)"/>
              )}
              {(tipoFilter==="todas"||tipoFilter==="Ticket")&&(
                <KpiCard icon={TicketIcon} label="Tickets resueltos" value={`${kpis.ticketsRate.toFixed(0)}%`} sub={`de ${numFmt(kpis.ticketsTotal)} tickets`} accent="var(--amber)"/>
              )}
              {tipoFilter==="todas"&&(
                <KpiCard icon={TrendingUp} label="Cumplimiento general" value={`${kpis.overallRate.toFixed(0)}%`} accent="var(--signal)"/>
              )}
              <KpiCard icon={Calendar} label="Días hábiles del mes"
                value={kpis.diasHabiles%1===0?numFmt(kpis.diasHabiles):kpis.diasHabiles.toFixed(1)}
                sub="Sin domingos · sábados medio día" accent="var(--amber)"/>
              <KpiCard icon={Calendar} label="Días laborados"
                value={kpis.diasLaborados%1===0?numFmt(kpis.diasLaborados):kpis.diasLaborados.toFixed(1)}
                sub="Transcurridos a la fecha más reciente" accent="var(--signal)"/>
              {(tipoFilter==="todas"||tipoFilter==="Instalación")&&instalacionesProjection&&(
                <KpiCard icon={TrendingUp} label="Proyección de cierre — Instalaciones"
                  value={numFmt(Math.round(instalacionesProjection.proyeccion))}
                  sub={`${numFmt(instalacionesProjection.realizadas)} realizadas · ${instalacionesProjection.tasaDiaria.toFixed(1)}/día`}
                  accent="var(--amber)"/>
              )}
              {(tipoFilter==="todas"||tipoFilter==="Ticket")&&ticketsProjection&&(
                <KpiCard icon={TrendingUp} label="Proyección de cierre — Tickets"
                  value={numFmt(Math.round(ticketsProjection.proyeccion))}
                  sub={`${numFmt(ticketsProjection.realizados)} resueltos · ${ticketsProjection.tasaDiaria.toFixed(1)}/día`}
                  accent="var(--signal)"/>
              )}
              {(tipoFilter==="todas"||tipoFilter==="Instalación")&&diasAtencionInst!==null&&(
                <KpiCard icon={Clock} label="Días prom. de atención — Instalaciones"
                  value={diasAtencionInst.toFixed(1)}
                  sub="Promedio días entre creación y atención (realizadas)"
                  accent="var(--signal)"/>
              )}
              {(tipoFilter==="todas"||tipoFilter==="Ticket")&&diasAtencionTick!==null&&(
                <KpiCard icon={Clock} label="Días prom. de atención — Tickets"
                  value={diasAtencionTick.toFixed(1)}
                  sub="Promedio días entre creación y atención (realizados)"
                  accent="var(--amber)"/>
              )}
            </div>
          )}<div className="chart-grid">
            <ChartCard title="Promedio diario de órdenes realizadas por tipo" height={300}>
              <PieChart margin={{top:10,right:10,bottom:10,left:10}}>
                <Pie data={promedioDiarioData} dataKey="value" nameKey="name" innerRadius="55%" outerRadius="85%" paddingAngle={2}>
                  <Cell fill="var(--signal)"/><Cell fill="var(--amber)"/>
                </Pie>
                <Tooltip contentStyle={tooltipStyle} formatter={(v,n,e)=>[`${v.toFixed(1)}/día · ${e.payload.pct.toFixed(0)}%`,n]}/>
                <Legend verticalAlign="bottom" align="center" wrapperStyle={{fontSize:12.5,paddingTop:12}}
                  formatter={(value,e)=>{const d=e.payload;return `${d.name} — ${d.value.toFixed(1)}/día (${d.pct.toFixed(0)}%)`;}}/>
              </PieChart>
            </ChartCard>
            <ChartCard title="Cumplimiento por tipo de orden">
              <BarChart data={tipoBreakdown}>
                <CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/>
                <XAxis dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false}/>
                <YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={40}/>
                <Tooltip contentStyle={tooltipStyle}/>
                <Legend wrapperStyle={{fontSize:12}}/>
                <Bar dataKey="realizado" name="Realizado" fill="var(--signal)" radius={[3,3,0,0]}/>
                <Bar dataKey="no_realizado" name="No realizado" fill="var(--critical)" radius={[3,3,0,0]}/>
              </BarChart>
            </ChartCard>
            <div className="chart-card" style={{gridColumn:"1 / -1"}}>
              <div className="chart-title">{`Evolución diaria — Órdenes por día (${currentMonthLabel})`}</div>
              <ResponsiveContainer width="100%" height={360}>
                <BarChart data={dailyOrdersData} margin={{top:10,right:10,bottom:40,left:10}}>
                  <CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/>
                  <XAxis dataKey="label" stroke="var(--text-dim)" fontSize={11} tickLine={false} interval={0} angle={-40} textAnchor="end"/>
                  <YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={40}
                    label={{value:"Órdenes",angle:-90,position:"insideLeft",fill:"var(--text-dim)",fontSize:11}}/>
                  <Tooltip contentStyle={tooltipStyle}/>
                  <Legend wrapperStyle={{fontSize:12}}/>
                  {(tipoFilter==="todas"||tipoFilter==="Instalación")&&(
                    <Bar dataKey="Instalación" name="Instalación" stackId="dia" fill="var(--signal)" radius={tipoFilter==="Instalación"?[3,3,0,0]:[0,0,0,0]}>
                      <LabelList dataKey="Instalación" position="inside" fill="#FFF" fontSize={11} formatter={v=>v?v:""}/>
                    </Bar>
                  )}
                  {(tipoFilter==="todas"||tipoFilter==="Ticket")&&(
                    <Bar dataKey="Ticket" name="Ticket" stackId="dia" fill="var(--amber)" radius={[3,3,0,0]}>
                      <LabelList dataKey="Ticket" position="inside" fill="#FFF" fontSize={11} formatter={v=>v?v:""}/>
                    </Bar>
                  )}
                </BarChart>
              </ResponsiveContainer>
            </div><ChartCard title="Volumen por zona (top 8)" height={300}>
              <BarChart data={zonaData} layout="vertical" margin={{left:8}}>
                <CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/>
                <XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/>
                <YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={110}/>
                <Tooltip contentStyle={tooltipStyle}/><Legend wrapperStyle={{fontSize:12}}/>
                <Bar dataKey="realizado" name="Realizado" stackId="z" fill="var(--signal)" radius={[0,3,3,0]}/>
                <Bar dataKey="no_realizado" name="No realizado" stackId="z" fill="var(--critical)" radius={[0,3,3,0]}/>
              </BarChart>
            </ChartCard>
            <ChartCard title="Técnicos con más órdenes completadas (top 8)" height={300}>
              <BarChart data={tecnicoData} layout="vertical" margin={{left:8}}>
                <CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/>
                <XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/>
                <YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/>
                <Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Completadas"]}/>
                <Bar dataKey="value" name="Completadas" fill="var(--signal)" radius={[0,3,3,0]}/>
              </BarChart>
            </ChartCard>
            <ChartCard title="Principales motivos de no cumplimiento (top 8)" height={300}>
              <BarChart data={motivoData} layout="vertical" margin={{left:8}}>
                <CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/>
                <XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/>
                <YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={150}/>
                <Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Casos"]}/>
                <Bar dataKey="value" name="Casos" fill="var(--amber)" radius={[0,3,3,0]}/>
              </BarChart>
            </ChartCard>
          </div>
        </>
      )}
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
