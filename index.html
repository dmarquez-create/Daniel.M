// Fetch every row from the shared "ordenes" table, paginating past
// PostgREST's default 1000-row response limit.
async function fetchAllOrdenes() {
  const pageSize = 1000;
  let from = 0;
  let all = [];
  while (true) {
    const { data, error } = await db
      .from("ordenes")
      .select("*")
      .order("fecha", { ascending: true })
      .range(from, from + pageSize - 1);
    if (error) throw error;
    all = all.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

// Replace all rows in the shared table with a freshly imported set.
// Inserts are chunked to keep each request small.
async function replaceAllOrdenes(records) {
  const { error: delError } = await db.from("ordenes").delete().gt("id", 0);
  if (delError) throw delError;

  const chunkSize = 500;
  for (let i = 0; i < records.length; i += chunkSize) {
    const chunk = records.slice(i, i + chunkSize).map((r) => ({
      fecha: r.fecha,
      tipo: r.tipo,
      estatus: r.estatus,
      tecnico: r.tecnico,
      agente: r.agente,
      zona: r.zona,
      motivo: r.motivo
    }));
    const { error: insError } = await db.from("ordenes").insert(chunk);
    if (insError) throw insError;
  }
}

// ---------- Field mapping / parsing helpers ----------
// Built around the real "BD Agenda" sheet: one row per work order
// (Tipo de orden, Fecha, Estatus Final, Tecnico, Agente, Zona, Motivo...)

const COLUMN_SYNONYMS = {
  tipo: ["tipo_de_orden", "tipo_orden", "tipo", "order_type"],
  fecha: ["fecha", "date"],
  estatus: ["estatus_final", "estatus", "status", "estado"],
  tecnico: ["tecnico", "technician"],
  agente: ["agente", "agent"],
  zona: ["zona", "zone"],
  motivo_no_realizado: ["motivo_de_no_realizado", "motivo_no_realizado", "motivos_de_no_realizado", "motivos_no_realizado"],
  motivo_imposibilidad: ["motivos_de_imposibilidad", "motivo_de_imposibilidad", "motivos_imposibilidad", "motivo_imposibilidad"]
};

function normalizeKey(k) {
  return k
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_|_$/g, "");
}

function buildHeaderMap(rawHeaders) {
  const normalized = rawHeaders
    .filter((h) => h !== null && h !== undefined)
    .map((h) => ({ original: h, norm: normalizeKey(h) }));
  const map = {};
  Object.entries(COLUMN_SYNONYMS).forEach(([canonical, syns]) => {
    const match = normalized.find((h) => syns.includes(h.norm));
    if (match) map[canonical] = match.original;
  });
  return map;
}

function pickAgendaSheet(workbook) {
  const candidate = workbook.SheetNames.find((n) => normalizeKey(n).includes("agenda"));
  return candidate || workbook.SheetNames[0];
}

function excelSerialToDate(n) {
  return new Date(Math.round((n - 25569) * 86400 * 1000));
}

function parseDateValue(val) {
  if (val instanceof Date && !isNaN(val)) return val;
  if (typeof val === "number") {
    const d = excelSerialToDate(val);
    return isNaN(d) ? null : d;
  }
  if (typeof val === "string") {
    const trimmed = val.trim();
    let d = new Date(trimmed);
    if (!isNaN(d)) return d;
    const m = trimmed.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (m) {
      const [, a, b, y] = m;
      d = new Date(`${y.length === 2 ? "20" + y : y}-${b.padStart(2, "0")}-${a.padStart(2, "0")}`);
      if (!isNaN(d)) return d;
    }
  }
  return null;
}

function cleanText(val, fallback) {
  if (val === null || val === undefined) return fallback;
  const s = val.toString().trim().replace(/\s+/g, " ");
  return s.length ? s : fallback;
}

function processRows(rows) {
  if (!rows.length) return { records: [], skipped: 0 };
  const headerMap = buildHeaderMap(Object.keys(rows[0]));
  let skipped = 0;
  const records = rows
    .map((row) => {
      const fecha = headerMap.fecha ? parseDateValue(row[headerMap.fecha]) : null;
      const tipoRaw = headerMap.tipo ? normalizeKey(row[headerMap.tipo] || "") : "";
      const estatusRaw = headerMap.estatus ? normalizeKey(row[headerMap.estatus] || "") : "";

      const tipo = tipoRaw === "instalacion" ? "InstalaciÃ³n" : tipoRaw === "ticket" ? "Ticket" : null;
      const estatus = estatusRaw === "realizado" ? "Realizado" : estatusRaw === "no_realizado" ? "No realizado" : null;

      if (!fecha || !tipo || !estatus) {
        skipped += 1;
        return null;
      }

      const motivo =
        cleanText(headerMap.motivo_no_realizado ? row[headerMap.motivo_no_realizado] : null, null) ||
        cleanText(headerMap.motivo_imposibilidad ? row[headerMap.motivo_imposibilidad] : null, null);

      return {
        fecha: fecha.toISOString().slice(0, 10),
        tipo,
        estatus,
        tecnico: cleanText(headerMap.tecnico ? row[headerMap.tecnico] : null, "Sin asignar"),
        agente: cleanText(headerMap.agente ? row[headerMap.agente] : null, "Sin asignar"),
        zona: cleanText(headerMap.zona ? row[headerMap.zona] : null, "Sin zona"),
        motivo
      };
    })
    .filter(Boolean)
    .sort((a, b) => a.fecha.localeCompare(b.fecha));

  return { records, skipped };
}

function workingDaysInMonth(year, monthNum, throughDay) {
  const daysInMonth = new Date(year, monthNum, 0).getDate();
  const lastDay = throughDay ? Math.min(throughDay, daysInMonth) : daysInMonth;
  let total = 0;
  for (let day = 1; day <= lastDay; day++) {
    const dow = new Date(year, monthNum - 1, day).getDay(); // 0 = Sunday, 6 = Saturday
    if (dow === 0) continue;
    total += dow === 6 ? 0.5 : 1;
  }
  return total;
}

function topCounts(items, keyFn, limit) {
  const counts = new Map();
  items.forEach((item) => {
    const k = keyFn(item);
    if (!k) return;
    counts.set(k, (counts.get(k) || 0) + 1);
  });
  return Array.from(counts.entries())
    .map(([name, value]) => ({ name, value }))
    .sort((a, b) => b.value - a.value)
    .slice(0, limit);
}

                <YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120} />
                <Tooltip contentStyle={tooltipStyle} labelStyle={{ color: "var(--text-muted)" }} formatter={(v) => [v, "Completadas"]} />
                <Bar dataKey="value" name="Completadas" fill="var(--signal)" radius={[0, 3, 3, 0]} />
              </BarChart>
            </ChartCard>

            <ChartCard title="Principales motivos de no cumplimiento (top 8)" height={300}>
              <BarChart data={motivoData} layout="vertical" margin={{ left: 8 }}>
                <CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false} />
                <XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false} />
                <YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={150} />
                <Tooltip contentStyle={tooltipStyle} labelStyle={{ color: "var(--text-muted)" }} formatter={(v) => [v, "Casos"]} />
                <Bar dataKey="value" name="Casos" fill="var(--amber)" radius={[0, 3, 3, 0]} />
              </BarChart>
            </ChartCard>
          </div>
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
