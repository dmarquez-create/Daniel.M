        :root{--ink:#F1F4F8;--surface:#FFFFFF;--surface-2:#E6ECF3;--border:#D7E0EA;--signal:#2256C9;--signal-soft:rgba(34,86,201,0.14);--amber:#F2780C;--critical:#D6453F;--text:#16233B;--text-muted:#57667C;--text-dim:#8997AB;--sw:256px;--sb-bg:#0F2A2E;--sb-bg-grad:linear-gradient(165deg,#123238 0%,#0D2428 55%,#0A1D20 100%);--sb-accent:#2DD4B8;--sb-accent-soft:rgba(45,212,184,0.16);--sb-border:rgba(255,255,255,.08);--sb-text:rgba(255,255,255,.6);--sb-text-dim:rgba(255,255,255,.32);}

          </div>)}
          <div className="chart-grid">
            <div className="chart-card" style={{gridColumn:"1 / -1"}}><div className="chart-title">Cumplimiento por tipo de orden — Últimos 4 meses (%)</div><ResponsiveContainer width="100%" height={280}><BarChart data={cumplimiento3MesesData} margin={{top:10,right:20,bottom:10,left:10}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/><XAxis dataKey="mes" stroke="var(--text-dim)" fontSize={12} tickLine={false}/><YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={36} domain={[0,100]} tickFormatter={v=>`${v}%`}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[`${v}%`,"Cumplimiento"]}/><Legend wrapperStyle={{fontSize:12}}/>{(tipoFilter==="todas"||tipoFilter==="Instalación")&&<Bar dataKey="Instalación" name="Instalación" radius={[4,4,0,0]}>{cumplimiento3MesesData.map((e,i)=>(<Cell key={i} fill={semaforoColor(e.Instalación)}/>))}<LabelList dataKey="Instalación" position="top" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar>}{(tipoFilter==="todas"||tipoFilter==="Ticket")&&<Bar dataKey="Ticket" name="Ticket" radius={[4,4,0,0]}>{cumplimiento3MesesData.map((e,i)=>(<Cell key={i} fill={semaforoColor(e.Ticket)}/>))}<LabelList dataKey="Ticket" position="top" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar>}</BarChart></ResponsiveContainer></div>
            {(tipoFilter==="todas"||tipoFilter==="Instalación")&&(<ChartCardM title="Instalaciones realizadas — Últimos 4 meses" height={260}><BarChart data={instalaciones3MesesData} margin={{top:10,right:20,bottom:10,left:10}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/><XAxis dataKey="mes" stroke="var(--text-dim)" fontSize={12} tickLine={false}/><YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={36}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Instalaciones realizadas"]}/><Bar dataKey="realizadas" name="Realizadas" fill="var(--signal)" radius={[4,4,0,0]}><LabelList dataKey="realizadas" position="top" fontSize={12} fontWeight={600} fill="var(--text-muted)"/></Bar></BarChart></ChartCardM>)}
            {(tipoFilter==="todas"||tipoFilter==="Ticket")&&(<ChartCardM title="Tickets realizados — Últimos 4 meses" height={260}><BarChart data={tickets3MesesData} margin={{top:10,right:20,bottom:10,left:10}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/><XAxis dataKey="mes" stroke="var(--text-dim)" fontSize={12} tickLine={false}/><YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={36}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Tickets realizados"]}/><Bar dataKey="realizados" name="Realizados" fill="var(--amber)" radius={[4,4,0,0]}><LabelList dataKey="realizados" position="top" fontSize={12} fontWeight={600} fill="var(--text-muted)"/></Bar></BarChart></ChartCardM>)}
            <ChartCardM title="Promedio diario de órdenes realizadas por tipo" height={300}><PieChart margin={{top:10,right:10,bottom:10,left:10}}><Pie data={promedioDiarioData} dataKey="value" nameKey="name" innerRadius="55%" outerRadius="85%" paddingAngle={2}><Cell fill="var(--signal)"/><Cell fill="var(--amber)"/></Pie><Tooltip contentStyle={tooltipStyle} formatter={(v,n,e)=>[`${v.toFixed(1)}/día · ${e.payload.pct.toFixed(0)}%`,n]}/><Legend verticalAlign="bottom" align="center" wrapperStyle={{fontSize:12.5,paddingTop:12}} formatter={(value,e)=>{const d=e&&e.payload?e.payload:{name:value,value:0,pct:0};return d.name+" — "+(d.value||0).toFixed(1)+"/día ("+(d.pct||0).toFixed(0)+"%)"; `${d.name} — ${d.value.toFixed(1)}/día (${d.pct.toFixed(0)}%)`;}}/></PieChart></ChartCardM>
            <div className="chart-card" style={{gridColumn:"1 / -1"}}><div className="chart-title">{`Órdenes realizadas por día (${currentMonthLabel})`}</div><ResponsiveContainer width="100%" height={360}><BarChart data={dailyOrdersData} margin={{top:10,right:10,bottom:40,left:10}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/><XAxis dataKey="label" stroke="var(--text-dim)" fontSize={11} tickLine={false} interval={0} angle={-40} textAnchor="end"/><YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={40} label={{value:"Órdenes",angle:-90,position:"insideLeft",fill:"var(--text-dim)",fontSize:11}}/><Tooltip contentStyle={tooltipStyle}/><Legend wrapperStyle={{fontSize:12}}/>{(tipoFilter==="todas"||tipoFilter==="Instalación")&&(<Bar dataKey="Instalación" name="Instalación" stackId="dia" fill="var(--signal)" radius={tipoFilter==="Instalación"?[3,3,0,0]:[0,0,0,0]}><LabelList dataKey="Instalación" position="inside" fill="#FFF" fontSize={11} formatter={v=>v?v:""}/></Bar>)}{(tipoFilter==="todas"||tipoFilter==="Ticket")&&(<Bar dataKey="Ticket" name="Ticket" stackId="dia" fill="var(--amber)" radius={[3,3,0,0]}><LabelList dataKey="Ticket" position="inside" fill="#FFF" fontSize={11} formatter={v=>v?v:""}/></Bar>)}</BarChart></ResponsiveContainer></div>
            <ChartCardM title="Volumen por zona (top 8)" height={300}><BarChart data={zonaData} layout="vertical" margin={{left:8}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={110}/><Tooltip contentStyle={tooltipStyle} content={({active,payload,label})=>{if(!active||!payload||!payload.length)return null;const real=payload.find(p=>p.dataKey==="realizado")?.value||0;const noReal=payload.find(p=>p.dataKey==="no_realizado")?.value||0;return(<div style={tooltipStyle}><div style={{fontWeight:600,marginBottom:6}}>{label}</div><div style={{color:"var(--signal)"}}>Realizado : {real}</div><div style={{color:"var(--critical)"}}>No realizado : {noReal}</div><div style={{color:"var(--text-muted)",marginTop:4,borderTop:"1px solid var(--border)",paddingTop:4}}>Total : {real+noReal}</div></div>);}}/><Legend wrapperStyle={{fontSize:12}}/><Bar dataKey="realizado" name="Realizado" stackId="z" fill="var(--signal)" radius={[0,3,3,0]}/><Bar dataKey="no_realizado" name="No realizado" stackId="z" fill="var(--critical)" radius={[0,3,3,0]}/></BarChart></ChartCardM>
            {zonaCumplimientoData.top.length>0&&(<ChartCardM title="Zonas con mejor cumplimiento (top 5)" height={260}><BarChart data={zonaCumplimientoData.top} layout="vertical" margin={{left:8,right:40}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false} domain={[0,100]} tickFormatter={v=>`${v}%`}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/><Tooltip contentStyle={tooltipStyle} formatter={(v,n,p)=>[`${p.payload.pct}% (${p.payload.realizado}/${p.payload.total})`,"Cumplimiento"]}/><Bar dataKey="pct" name="Cumplimiento" radius={[0,3,3,0]}>{zonaCumplimientoData.top.map((e,i)=>(<Cell key={i} fill={semaforoColor(e.pct)}/>))}<LabelList dataKey="pct" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar></BarChart></ChartCardM>)}
            {zonaCumplimientoData.bottom.length>0&&(<ChartCardM title="Zonas con menor cumplimiento (bottom 5)" height={260}><BarChart data={zonaCumplimientoData.bottom} layout="vertical" margin={{left:8,right:40}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false} domain={[0,100]} tickFormatter={v=>`${v}%`}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/><Tooltip contentStyle={tooltipStyle} formatter={(v,n,p)=>[`${p.payload.pct}% (${p.payload.realizado}/${p.payload.total})`,"Cumplimiento"]}/><Bar dataKey="pct" name="Cumplimiento" radius={[0,3,3,0]}>{zonaCumplimientoData.bottom.map((e,i)=>(<Cell key={i} fill={semaforoColor(e.pct)}/>))}<LabelList dataKey="pct" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar></BarChart></ChartCardM>)}
            <ChartCardM title="Principales motivos de no cumplimiento (top 8)" height={300}><BarChart data={motivoData} layout="vertical" margin={{left:8,right:52}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={150}/><Tooltip contentStyle={tooltipStyle} formatter={(v,n,p)=>[`${v} casos (${p.payload.pct}% del total no realizado)`,"Motivo"]}/><Bar dataKey="value" name="Casos" fill="var(--amber)" radius={[0,3,3,0]}><LabelList dataKey="pct" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar></BarChart></ChartCardM>
            {imposibilidadData.length>0&&(<ChartCardM title="Motivos de imposibilidad técnica (top 8)" height={300}><BarChart data={imposibilidadData} layout="vertical" margin={{left:8,right:52}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={160}/><Tooltip contentStyle={tooltipStyle} formatter={(v,n,p)=>[`${v} casos (${p.payload.pct}% del total imposibilidad)`,"Motivo"]}/><Bar dataKey="value" name="Casos" fill="var(--critical)" radius={[0,3,3,0]}><LabelList dataKey="pct" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar></BarChart></ChartCardM>)}
            {zonaNoContactadoData.length>0&&(<ChartCardM title="% No contactado por zona (top 10)" height={300}><BarChart data={zonaNoContactadoData} layout="vertical" margin={{left:8,right:44}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false} tickFormatter={v=>`${v}%`}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/><Tooltip contentStyle={tooltipStyle} formatter={(v,n,p)=>[`${p.payload.pct}% (${p.payload.casos} de ${p.payload.total})`,"No contactado"]}/><Bar dataKey="pct" name="No contactado" fill="var(--amber)" radius={[0,3,3,0]}><LabelList dataKey="pct" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar></BarChart></ChartCardM>)}
          </div>
        </>
      )}
    </div>
        )}
      </div>
      {clientDetail&&(
        <div className="cal-modal" onClick={e=>{if(e.target===e.currentTarget)setClientDetail(null);}}>
          <div className="cal-modal-box" style={{maxWidth:640,width:"92vw"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div className="cal-modal-title">{clientDetail.nombre}</div>
              <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={()=>setClientDetail(null)}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16,fontSize:13}}>
              <div style={{display:"flex",gap:8,alignItems:"center",color:"var(--text-muted)"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>{clientDetail.direccion}</div>
              <div style={{display:"flex",gap:8,alignItems:"center",color:"var(--text-muted)"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>{clientDetail.telefono}</div>
            </div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Historial de órdenes ({clientDetail.ordenes.length})</div>
            <div style={{maxHeight:"45vh",overflow:"auto"}}>
              {clientDetail.ordenes.map(o=>{const stageName=o.stage_id?o.stage_id[1]:"";const stageColor=STAGE_COLORS[stageName]||"#8997AB";return(
                <div key={o.id} className="cal-modal-event">
                  <div className="cal-modal-dot" style={{background:stageColor}}/>
                  <div className="cal-modal-info">
                    <div className="cal-modal-name">{o.name?.replace(/S\d+ - /,"")||o.name}</div>
                    <div className="cal-modal-cal">{stageName} · {(o.technician_names||[]).join(", ")||"Sin técnico"}</div>
                    <div className="cal-modal-time">{o.create_date?new Date(o.create_date).toLocaleDateString("es-MX"):"Sin fecha"}{o.planned_date_begin?` · Agendada: ${new Date(o.planned_date_begin).toLocaleDateString("es-MX")}`:""}</div>
                  </div>
                </div>
              );})}
              {clientDetail.ordenes.length===0&&<div style={{color:"var(--text-muted)",fontSize:13,padding:"12px 0"}}>Sin órdenes registradas para este cliente.</div>}
            </div>
          </div>
        </div>
      )}
      {showDataPreview&&(
        <div className="cal-modal" onClick={e=>{if(e.target===e.currentTarget){setShowDataPreview(false);setPreviewSearch("");}}}>
          <div className="cal-modal-box" style={{maxWidth:1000,width:"95vw"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div className="cal-modal-title">Vista previa de datos ({numFmt(filtered.length)} órdenes que alimentan tablas y gráficas)</div>
              <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={()=>{setShowDataPreview(false);setPreviewSearch("");}}>✕</button>
            </div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>Mes: {MONTH_OPTIONS.find(o=>o.key===month)?.label} · Tipo: {tipoFilter==="todas"?"Todas":tipoFilter} · Días {dayFrom}–{dayTo}</div>
            <input type="text" placeholder="Buscar por técnico, agente, zona, motivo…" value={previewSearch} onChange={e=>setPreviewSearch(e.target.value)} style={{width:"100%",padding:"8px 12px",border:"1px solid var(--border)",borderRadius:8,background:"var(--surface)",color:"var(--text)",fontSize:13,fontFamily:"'Inter',sans-serif",marginBottom:12}}/>
            <div style={{maxHeight:"55vh",overflow:"auto",border:"1px solid var(--border)",borderRadius:8}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead style={{position:"sticky",top:0,background:"var(--surface-2)"}}>
                  <tr>
                    {["Fecha","Tipo","Estatus","Técnico","Agente","Zona","N° Cliente","Motivo","Motivo imposibilidad"].map(h=>(<th key={h} style={{textAlign:"left",padding:"8px 10px",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.filter(r=>{if(!previewSearch.trim())return true;const q=previewSearch.trim().toLowerCase();return[r.tecnico,r.agente,r.zona,r.motivo,r.motivo_imposibilidad,r.id_cliente,r.cliente].some(v=>v&&String(v).toLowerCase().includes(q));}).slice(0,300).map((r,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid var(--border)"}}>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.fecha}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.tipo}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap",color:r.estatus==="Realizado"?"var(--signal)":"var(--critical)",fontWeight:600}}>{r.estatus}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.tecnico}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.agente}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.zona}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.id_cliente||"—"}</td>
                      <td style={{padding:"6px 10px"}}>{r.motivo||"—"}</td>
                      <td style={{padding:"6px 10px"}}>{r.motivo_imposibilidad||"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:8}}>{filtered.length>300?`Mostrando las primeras 300 de ${numFmt(filtered.length)} filas (usa el buscador para acotar).`:`Mostrando ${numFmt(filtered.length)} de ${numFmt(filtered.length)} filas.`}</div>
          </div>
        </div>
      )}
      {/* Mobile bottom nav */}
      <nav className="mob-nav">
        <div className="mob-nav-inner">
          <button className={`mob-nav-item${activeModule==="dashboard"&&tipoFilter==="todas"?" on":""}`} onClick={()=>{setActiveModule("dashboard");setTipoFilter("todas");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span className="mob-nav-label">General</span>
          </button>
          <button className={`mob-nav-item${activeModule==="dashboard"&&tipoFilter==="Instalación"?" on":""}`} onClick={()=>{setActiveModule("dashboard");setTipoFilter("Instalación");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span className="mob-nav-label">Inst.</span>
          </button>
          <button className={`mob-nav-item${activeModule==="dashboard"&&tipoFilter==="Ticket"?" on":""}`} onClick={()=>{setActiveModule("dashboard");setTipoFilter("Ticket");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2.59 12.58A2 2 0 0 1 2 11.17V4a2 2 0 0 1 2-2h7.17a2 2 0 0 1 1.41.59l8 8a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            <span className="mob-nav-label">Tickets</span>
          </button>
          <button className={`mob-nav-item${activeModule==="agentes"?" on":""}`} onClick={()=>{setActiveModule("agentes");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span className="mob-nav-label">Agentes</span>
          </button>
          <button className={`mob-nav-item`} onClick={()=>setMobSidebarOpen(v=>!v)}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <span className="mob-nav-label">Más</span>
          </button>
        </div>
      </nav>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
