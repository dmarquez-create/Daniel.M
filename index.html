  const imposibilidadData=useMemo(()=>{const rows=filtered.filter(r=>r.estatus==="No realizado"&&r.motivo_imposibilidad);const total=rows.length;const counts=new Map();rows.forEach(r=>{counts.set(r.motivo_imposibilidad,(counts.get(r.motivo_imposibilidad)||0)+1);});return Array.from(counts.entries()).map(([name,value])=>({name,value,pct:total?parseFloat(((value/total)*100).toFixed(1)):0})).sort((a,b)=>b.value-a.value).slice(0,8);},[filtered]);

      const topZonaBaja=zonaMap.size?[...zonaMap.entries()].filter(([,v])=>v.t>=2).map(([n,v])=>({name:n,pct:Math.round((v.r/v.t)*100)})).sort((a,b)=>a.pct-b.pct)[0]?.name||"Sin datos":"Sin datos";
      try{

  const nombresPerfiles=useMemo(()=>{const normalize=s=>s?s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," "):"";const seen=new Map();data.forEach(r=>{[r.tecnico,r.agente].forEach(n=>{const k=normalize(n);if(k&&k!=="sin asignar"&&!seen.has(k))seen.set(k,n.trim());});});return Array.from(seen.values()).sort((a,b)=>a.localeCompare(b));},[data]);
  const activosData=useMemo(()=>{if(activeModule!=="agentes")return{tecnicos:[],agentes:[]};const normalize=s=>s?s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," "):"";const tecnicos=new Map();const agentes=new Map();filtered.forEach(r=>{const tk=normalize(r.tecnico);if(tk&&tk!=="sin asignar"){if(!tecnicos.has(tk))tecnicos.set(tk,{name:r.tecnico.trim(),total:0,realizadas:0});const t=tecnicos.get(tk);t.total++;if(r.estatus==="Realizado")t.realizadas++;}const ak=normalize(r.agente);if(ak&&ak!=="sin asignar"){if(!agentes.has(ak))agentes.set(ak,{name:r.agente.trim(),total:0,realizadas:0});const a=agentes.get(ak);a.total++;if(r.estatus==="Realizado")a.realizadas++;}});return{tecnicos:Array.from(tecnicos.values()).sort((a,b)=>b.total-a.total),agentes:Array.from(agentes.values()).sort((a,b)=>b.total-a.total)};},[filtered,activeModule]);
  const agenteData=useMemo(()=>{if(activeModule!=="agentes")return[];const normalize=s=>s?s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," "):"";const grouped=new Map();filtered.forEach(r=>{const key=normalize(r.agente);if(!key||key==="sin asignar")return;const canonical=grouped.has(key)?grouped.get(key).name:r.agente.trim();if(!grouped.has(key))grouped.set(key,{name:canonical,realizado:0,no_realizado:0});const g=grouped.get(key);if(r.estatus==="Realizado")g.realizado++;else g.no_realizado++;});return Array.from(grouped.values()).map(g=>{const total=g.realizado+g.no_realizado;return{...g,total,pct:total?Math.round((g.realizado/total)*100):0};}).sort((a,b)=>b.pct-a.pct);},[filtered,activeModule]);
  if(authLoading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F8FAFC",gap:10,color:"#64748B",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}><Loader2 size={18} className="spin"/> Verificando sesión…</div>);

        :root{--ink:#F8FAFC;--surface:#FFFFFF;--surface-2:#F1F5F9;--border:#E2E8F0;--signal:#2563EB;--signal-soft:rgba(37,99,235,0.12);--amber:#EA580C;--critical:#DC2626;--success:#22C55E;--text:#1E293B;--text-muted:#64748B;--text-dim:#94A3B8;--icon:#CBD5E1;--sw:256px;--topnav-h:74px;--sb-bg:#0F172A;--sb-bg-grad:linear-gradient(165deg,#111C33 0%,#0F172A 55%,#0B1222 100%);--sb-accent:#2563EB;--sb-accent-soft:rgba(37,99,235,0.22);--sb-hover:#1E40AF;--sb-border:rgba(255,255,255,.08);--sb-text:rgba(255,255,255,.62);--sb-text-dim:rgba(203,213,225,.4);--card-bg:#FFFFFF;--card-border:#E2E8F0;--chip-bg:#EFF6FF;--chip-text:#1E40AF;--sub-text:#64748B;--ring-track:#E8EDF3;--chart-label:#475569;}

                        <tr key={z.name}>
                          <td style={{fontSize:12,fontWeight:500}}>{z.name}</td>
                          {(tipoFilter==="todas"||tipoFilter==="Instalación")&&<><td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{z.diasInst!==null?`${z.diasInst.toFixed(1)} (${numFmt(z.nInst)})`:"—"}</td><td title={z.slaInst!==null?`${numFmt(z.nInstSla)} de ${numFmt(z.nInst)} dentro del SLA (≤72h)`:undefined} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600,cursor:z.slaInst!==null?"help":undefined,color:z.slaInst===null?"var(--text-dim)":z.slaInst>=SLA_META_PCT?"#1A7F4B":"#D6453F"}}>{z.slaInst!==null?`${z.slaInst.toFixed(1)}%`:"—"}</td></>}
                          {(tipoFilter==="todas"||tipoFilter==="Ticket")&&<><td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{z.diasTick!==null?`${z.diasTick.toFixed(1)} (${numFmt(z.nTick)})`:"—"}</td><td title={z.slaTick!==null?`${numFmt(z.nTickSla)} de ${numFmt(z.nTick)} dentro del SLA (≤48h)`:undefined} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600,cursor:z.slaTick!==null?"help":undefined,color:z.slaTick===null?"var(--text-dim)":z.slaTick>=SLA_META_PCT?"#1A7F4B":"#D6453F"}}>{z.slaTick!==null?`${z.slaTick.toFixed(1)}%`:"—"}</td></>}
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                  {diasAtencionPorZonaData.length>MW_PAGE_SIZE&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10,flexWrap:"wrap"}}>
                      <button className="btn btn-ghost" disabled={pageSafe<=1} onClick={()=>setDiasZonaPage(p=>Math.max(1,p-1))}>← Anterior</button>
                      <span style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'JetBrains Mono',monospace"}}>Página {pageSafe} de {totalPages}</span>
                      <button className="btn btn-ghost" disabled={pageSafe>=totalPages} onClick={()=>setDiasZonaPage(p=>Math.min(totalPages,p+1))}>Siguiente →</button>
                      <span style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'JetBrains Mono',monospace",marginLeft:"auto"}}>{diasAtencionPorZonaData.length} zonas</span>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        </>
      )}
    </div>
        )}
      </div>
      {clientDetail&&(
        <div className="cal-modal" onClick={e=>{if(e.target===e.currentTarget)setClientDetail(null);}}>
          <div className="cal-modal-box" style={{maxWidth:640,width:"92vw"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div className="cal-modal-title">{clientDetail.nombre}</div>
              <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={()=>setClientDetail(null)}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16,fontSize:13}}>
              <div style={{display:"flex",gap:8,alignItems:"center",color:"var(--text-muted)"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>{clientDetail.direccion}</div>
              <div style={{display:"flex",gap:8,alignItems:"center",color:"var(--text-muted)"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>{clientDetail.telefono}</div>
            </div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Historial de órdenes ({clientDetail.ordenes.length})</div>
            <div style={{maxHeight:"45vh",overflow:"auto"}}>
              {clientDetail.ordenes.map(o=>{const stageName=o.stage_id?o.stage_id[1]:"";const stageColor=STAGE_COLORS[stageName]||"#94A3B8";return(
                <div key={o.id} className="cal-modal-event">
                  <div className="cal-modal-dot" style={{background:stageColor}}/>
                  <div className="cal-modal-info">
                    <div className="cal-modal-name">{o.name?.replace(/S\d+ - /,"")||o.name}</div>
                    <div className="cal-modal-cal">{stageName} · {(o.technician_names||[]).join(", ")||"Sin técnico"}</div>
                    <div className="cal-modal-time">{o.create_date?new Date(o.create_date).toLocaleDateString("es-MX"):"Sin fecha"}{o.planned_date_begin?` · Agendada: ${new Date(o.planned_date_begin).toLocaleDateString("es-MX")}`:""}</div>
                  </div>
                </div>
              );})}
              {clientDetail.ordenes.length===0&&<div style={{color:"var(--text-muted)",fontSize:13,padding:"12px 0"}}>Sin órdenes registradas para este cliente.</div>}
            </div>
          </div>
        </div>
      )}
      {showDataPreview&&(
        <div className="cal-modal" onClick={e=>{if(e.target===e.currentTarget){setShowDataPreview(false);setPreviewSearch("");}}}>
          <div className="cal-modal-box" style={{maxWidth:1000,width:"95vw"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div className="cal-modal-title">Vista previa de datos ({numFmt(filtered.length)} órdenes que alimentan tablas y gráficas)</div>
              <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={()=>{setShowDataPreview(false);setPreviewSearch("");}}>✕</button>
            </div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>Mes: {MONTH_OPTIONS.find(o=>o.key===month)?.label} · Tipo: {tipoFilter==="todas"?"Todas":tipoFilter} · Días {dayFrom}–{dayTo}</div>
            <input type="text" placeholder="Buscar por técnico, agente, zona, motivo…" value={previewSearch} onChange={e=>setPreviewSearch(e.target.value)} style={{width:"100%",padding:"8px 12px",border:"1px solid var(--border)",borderRadius:8,background:"var(--surface)",color:"var(--text)",fontSize:13,fontFamily:"'Inter',sans-serif",marginBottom:12}}/>
            <div style={{maxHeight:"55vh",overflow:"auto",border:"1px solid var(--border)",borderRadius:8}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead style={{position:"sticky",top:0,background:"var(--surface-2)"}}>
                  <tr>
                    {["Fecha","Tipo","Estatus","Técnico","Agente","Zona","N° Cliente","Motivo","Motivo imposibilidad"].map(h=>(<th key={h} style={{textAlign:"left",padding:"8px 10px",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.filter(r=>{if(!previewSearch.trim())return true;const q=previewSearch.trim().toLowerCase();return[r.tecnico,r.agente,r.zona,r.motivo,r.motivo_imposibilidad,r.id_cliente,r.cliente].some(v=>v&&String(v).toLowerCase().includes(q));}).slice(0,300).map((r,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid var(--border)"}}>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.fecha}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.tipo}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap",color:r.estatus==="Realizado"?"var(--signal)":"var(--critical)",fontWeight:600}}>{r.estatus}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.tecnico}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.agente}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.zona}</td>
                      <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{r.id_cliente||"—"}</td>
                      <td style={{padding:"6px 10px"}}>{r.motivo||"—"}</td>
                      <td style={{padding:"6px 10px"}}>{r.motivo_imposibilidad||"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:8}}>{filtered.length>300?`Mostrando las primeras 300 de ${numFmt(filtered.length)} filas (usa el buscador para acotar).`:`Mostrando ${numFmt(filtered.length)} de ${numFmt(filtered.length)} filas.`}</div>
          </div>
        </div>
      )}
      {/* Mobile bottom nav */}
      <nav className="mob-nav">
        <div className="mob-nav-inner">
          <button className={`mob-nav-item${activeModule==="dashboard"&&tipoFilter==="todas"?" on":""}`} onClick={()=>{setActiveModule("dashboard");setTipoFilter("todas");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span className="mob-nav-label">General</span>
          </button>
          <button className={`mob-nav-item${activeModule==="dashboard"&&tipoFilter==="Instalación"?" on":""}`} onClick={()=>{setActiveModule("dashboard");setTipoFilter("Instalación");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span className="mob-nav-label">Inst.</span>
          </button>
          <button className={`mob-nav-item${activeModule==="dashboard"&&tipoFilter==="Ticket"?" on":""}`} onClick={()=>{setActiveModule("dashboard");setTipoFilter("Ticket");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2.59 12.58A2 2 0 0 1 2 11.17V4a2 2 0 0 1 2-2h7.17a2 2 0 0 1 1.41.59l8 8a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            <span className="mob-nav-label">Tickets</span>
          </button>
          <button className={`mob-nav-item${activeModule==="agentes"?" on":""}`} onClick={()=>{setActiveModule("agentes");setMobSidebarOpen(false);}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span className="mob-nav-label">Agentes</span>
          </button>
          <button className={`mob-nav-item`} onClick={()=>setMobSidebarOpen(v=>!v)}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <span className="mob-nav-label">Más</span>
          </button>
        </div>
      </nav>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
