async function fetchAllOrdenes() {
  const pageSize = 1000; let from = 0; let all = [];
  while (true) {
    const { data, error } = await db.from("ordenes").select("*").order("fecha", { ascending: true }).range(from, from + pageSize - 1);
    if (error) throw error;
    all = all.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}
async function replaceAllOrdenes(records) {
  const { error: delError } = await db.from("ordenes").delete().gt("id", 0);
  if (delError) throw delError;
  const chunkSize = 500;
  for (let i = 0; i < records.length; i += chunkSize) {
    const chunk = records.slice(i, i + chunkSize).map((r) => ({ fecha: r.fecha, tipo: r.tipo, estatus: r.estatus, tecnico: r.tecnico, agente: r.agente, zona: r.zona, motivo: r.motivo, motivo_imposibilidad: r.motivo_imposibilidad ?? null, dias_atencion: r.dias_atencion ?? null }));
    const { error: insError } = await db.from("ordenes").insert(chunk);
    if (insError) throw insError;
  }
}

          <div className="app">
            <div className="ing-placeholder">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#8997AB" strokeWidth="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
              <h2>Ingeniería</h2>
              <p>Este módulo está en construcción. Próximamente disponible.</p>
            </div>
          </div>
        ):activeModule==="agentes"?(
          <div className="app">
            <div className="header">
              <div className="title-block">
                <div className="eyebrow"><Users size={13}/> Operaciones</div>
                <div className="title">Agentes y Técnicos</div>
              </div>
            </div>
            <div className="pulse-line"/>
            <div className="controls-row">
              <div className="toggle-group">
                <div className="range-toggle">{MONTH_OPTIONS.map(opt=>(<button key={opt.key} className={`range-btn${month===opt.key?" active":""}`} onClick={()=>setMonth(opt.key)}>{opt.label}</button>))}</div>
                <div className="range-toggle">{TIPO_OPTIONS.map(opt=>(<button key={opt.key} className={`range-btn${tipoFilter===opt.key?" active":""}`} onClick={()=>setTipoFilter(opt.key)}>{opt.label}</button>))}</div>
                <div className="date-range-control">
                  <span className="date-range-label">Del día</span>
                  <input type="number" className="day-input" min={1} max={daysInSelectedMonth} value={dayFrom} onChange={e=>{const v=Math.max(1,Math.min(parseInt(e.target.value)||1,dayTo));setDayFrom(v);}}/>
                  <span className="date-range-label">al</span>
                  <input type="number" className="day-input" min={dayFrom} max={daysInSelectedMonth} value={dayTo} onChange={e=>{const v=Math.min(daysInSelectedMonth,Math.max(parseInt(e.target.value)||daysInSelectedMonth,dayFrom));setDayTo(v);}}/>
                  {(dayFrom!==1||dayTo!==daysInSelectedMonth)&&(<button className="range-btn" style={{marginLeft:2}} onClick={()=>{setDayFrom(1);setDayTo(daysInSelectedMonth);}}>✕ Todo el mes</button>)}
                </div>
              </div>
            </div>
            {loadingData?(<div className="loading-screen"><Loader2 size={16} className="spin"/> Cargando…</div>):(
            <div className="chart-grid">
              <ChartCard title="Técnicos con más órdenes completadas (top 8)" height={300}><BarChart data={tecnicoData} layout="vertical" margin={{left:8}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Completadas"]}/><Bar dataKey="value" name="Completadas" fill="var(--signal)" radius={[0,3,3,0]}/></BarChart></ChartCard>
              <ChartCard title="Promedio diario de órdenes realizadas — Técnicos (top 8)" height={300}><BarChart data={tecnicoPromData} layout="vertical" margin={{left:8,right:36}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[`${v}/día`,"Promedio"]}/><Bar dataKey="value" name="Órdenes/día" fill="var(--signal)" radius={[0,3,3,0]}><LabelList dataKey="value" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}/día`}/></Bar></BarChart></ChartCard>
              <ChartCard title="Promedio diario de órdenes realizadas — Agentes (top 8)" height={300}><BarChart data={agentePromData} layout="vertical" margin={{left:8,right:36}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[`${v}/día`,"Promedio"]}/><Bar dataKey="value" name="Órdenes/día" fill="var(--amber)" radius={[0,3,3,0]}><LabelList dataKey="value" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}/día`}/></Bar></BarChart></ChartCard>
              {tecnicoImposibilidadData.length>0&&(<ChartCard title={`Técnicos con más casos: "${topMotivoImposibilidad}" (top 8)`} height={300}><BarChart data={tecnicoImposibilidadData} layout="vertical" margin={{left:8}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={130}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Casos"]}/><Bar dataKey="value" name="Casos" fill="var(--critical)" radius={[0,3,3,0]}/></BarChart></ChartCard>)}
              <div className="chart-card" style={{gridColumn:"1 / -1"}}><div className="chart-title">Cumplimiento por agente</div><ResponsiveContainer width="100%" height={Math.max(260,agenteData.length*36+60)}><BarChart data={agenteData} layout="vertical" margin={{left:8,right:40}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={130}/><Tooltip contentStyle={tooltipStyle} formatter={(v,n)=>[v,n==="realizado"?"Realizado":n==="no_realizado"?"No realizado":n]} labelFormatter={label=>{const row=agenteData.find(r=>r.name===label);return row?`${label} — ${row.pct}% cumplimiento`:label;}}/><Legend wrapperStyle={{fontSize:12}}/><Bar dataKey="realizado" name="Realizado" stackId="a" fill="var(--signal)" radius={[0,0,0,0]}><LabelList dataKey="pct" position="right" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar><Bar dataKey="no_realizado" name="No realizado" stackId="a" fill="var(--critical)" radius={[0,3,3,0]}/></BarChart></ResponsiveContainer></div>
            </div>)}
          </div>
        ):activeModule==="usuarios"&&isAdmin?(
          <div className="app">
            <div className="header">
              <div className="title-block">
                <div className="eyebrow"><Users size={13}/> Administración</div>
                <div className="title">Gestión de Usuarios</div>
              </div>
            </div>
            <div className="pulse-line"/>
            <div style={{maxWidth:560}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#57667C",marginBottom:10,textTransform:"uppercase",letterSpacing:".08em"}}>Crear nuevo usuario</div>
              <form onSubmit={handleCreateUser} className="usermgmt-form">
                <input className="usermgmt-input" type="email" placeholder="Correo electrónico" value={newEmail} onChange={e=>setNewEmail(e.target.value)} required/>
                <input className="usermgmt-input" type="password" placeholder="Contraseña" value={newPassword} onChange={e=>setNewPassword(e.target.value)} required minLength={6}/>
                <button className="btn btn-primary" type="submit" disabled={creatingUser}>{creatingUser?"Creando…":"Crear usuario"}</button>
              </form>
              {userMgmtMsg&&<div className={`usermgmt-msg ${userMgmtMsg.type}`}>{userMgmtMsg.text}</div>}
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#57667C",marginBottom:10,textTransform:"uppercase",letterSpacing:".08em"}}>Usuarios activos</div>
              {loadingUsers?<div className="loading-screen" style={{padding:"20px 0"}}><Loader2 size={14} className="spin"/> Cargando…</div>:(
                <table className="user-table">
                  <thead><tr><th>Correo</th><th>Creado</th><th></th></tr></thead>
                  <tbody>{userList.map(u=>(<tr key={u.id}><td>{u.email}{u.email===ADMIN_EMAIL&&<span style={{marginLeft:6,background:"#EAF0F7",color:"#2256C9",borderRadius:4,padding:"1px 5px",fontSize:10,fontWeight:600}}>ADMIN</span>}</td><td>{u.created_at?new Date(u.created_at).toLocaleDateString("es-MX"):"-"}</td><td>{u.email!==ADMIN_EMAIL&&<button className="btn btn-ghost" style={{padding:"4px 8px",fontSize:11}} onClick={()=>handleDeleteUser(u.id,u.email)}>Eliminar</button>}</td></tr>))}</tbody>
                </table>
              )}
            </div>
          </div>
        ):(
        <div className="app">
      <div className="header">
        <div className="title-block">
          <div className="eyebrow"><Radio size={13}/> Operaciones · BD Agenda</div>
          <div className="title">{tipoFilter==="Instalación"?"Dashboard de Instalaciones":tipoFilter==="Ticket"?"Dashboard de Tickets":"Dashboard de Instalaciones y Tickets"}</div>
        </div>
        <div className="actions">
          <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
          {isAdmin&&(<>
            <button className="btn" disabled={importing} onClick={()=>fileInputRef.current?.click()}>{importing?<Loader2 size={14} className="spin"/>:<Upload size={14}/>}{importing?"Importando…":"Importar CSV / Excel"}</button>
            {data.length>0&&<button className="btn btn-ghost" onClick={handleClear}><Trash2 size={14}/> Borrar datos</button>}
          </>)}
        </div>
      </div>
      <div className="pulse-line"/>
      {meta&&(<div className="meta-row">{meta.filename?`Última importación: ${meta.filename} (hoja "${meta.sheet}") · `:"Datos cargados desde la base de datos compartida · "}{numFmt(meta.rowCount)} órdenes{meta.skipped?` · ${numFmt(meta.skipped)} filas omitidas`:""}{meta.importedAt?` · ${new Date(meta.importedAt).toLocaleString("es-MX")}`:""}</div>)}
      {error&&<div className="error-banner"><AlertCircle size={16}/> {error}</div>}
      {loadingData?(<div className="loading-screen"><Loader2 size={16} className="spin"/> Cargando datos compartidos…</div>):data.length===0?(<div className="empty-state"><Wifi size={28} style={{color:"var(--text-dim)"}}/><h3>Aún no hay órdenes cargadas</h3><p>{isAdmin?"Importa tu archivo Excel.":"Pide al administrador que importe el archivo."}</p>{isAdmin&&<button className="btn btn-primary" onClick={()=>fileInputRef.current?.click()}><Upload size={14}/> Importar archivo</button>}</div>):(
        <>
          <div className="controls-row">
            <div className="toggle-group">
              <div className="range-toggle">{MONTH_OPTIONS.map(opt=>(<button key={opt.key} className={`range-btn${month===opt.key?" active":""}`} onClick={()=>setMonth(opt.key)}>{opt.label}</button>))}</div>
              <div className="range-toggle">{TIPO_OPTIONS.map(opt=>(<button key={opt.key} className={`range-btn${tipoFilter===opt.key?" active":""}`} onClick={()=>setTipoFilter(opt.key)}>{opt.label}</button>))}</div>
              <div className="date-range-control">
                <span className="date-range-label">Del día</span>
                <input type="number" className="day-input" min={1} max={daysInSelectedMonth} value={dayFrom} onChange={e=>{const v=Math.max(1,Math.min(parseInt(e.target.value)||1,dayTo));setDayFrom(v);}}/>
                <span className="date-range-label">al</span>
                <input type="number" className="day-input" min={dayFrom} max={daysInSelectedMonth} value={dayTo} onChange={e=>{const v=Math.min(daysInSelectedMonth,Math.max(parseInt(e.target.value)||daysInSelectedMonth,dayFrom));setDayTo(v);}}/>
                {(dayFrom!==1||dayTo!==daysInSelectedMonth)&&(<button className="range-btn" style={{marginLeft:2}} onClick={()=>{setDayFrom(1);setDayTo(daysInSelectedMonth);}}>✕ Todo el mes</button>)}
              </div>
            </div>
            <div className="scope-note"><Users size={13}/> Datos compartidos en vivo</div>
          </div>
          {kpis&&(<div className="kpi-grid">
            <KpiCard icon={ClipboardList} label="Total de órdenes" value={tipoFilter==="todas"?numFmt(kpis.total):numFmt(kpis.totalRealizadas)} sub={tipoFilter==="todas"?`${numFmt(kpis.instalacionesTotal)} instalaciones · ${numFmt(kpis.ticketsTotal)} tickets`:`Realizadas · de ${numFmt(kpis.total)} ${tipoFilter==="Instalación"?"instalaciones":"tickets"}`} accent="var(--signal)"/>
            {(tipoFilter==="todas"||tipoFilter==="Instalación")&&(<KpiCard icon={CheckCircle2} label="Instalaciones completadas" value={`${kpis.instalacionesRate.toFixed(0)}%`} sub={`de ${numFmt(kpis.instalacionesTotal)} instalaciones`} accent="var(--signal)"/>)}
            {(tipoFilter==="todas"||tipoFilter==="Ticket")&&(<KpiCard icon={TicketIcon} label="Tickets resueltos" value={`${kpis.ticketsRate.toFixed(0)}%`} sub={`de ${numFmt(kpis.ticketsTotal)} tickets`} accent="var(--amber)"/>)}
            {tipoFilter==="todas"&&(<KpiCard icon={TrendingUp} label="Cumplimiento general" value={`${kpis.overallRate.toFixed(0)}%`} accent="var(--signal)"/>)}
            <KpiCard icon={Calendar} label="Días hábiles del mes" value={kpis.diasHabiles%1===0?numFmt(kpis.diasHabiles):kpis.diasHabiles.toFixed(1)} sub="Sin domingos · sábados medio día" accent="var(--amber)"/>
            <KpiCard icon={Calendar} label="Días laborados" value={kpis.diasLaborados%1===0?numFmt(kpis.diasLaborados):kpis.diasLaborados.toFixed(1)} sub="Transcurridos a la fecha más reciente" accent="var(--signal)"/>
            {(tipoFilter==="todas"||tipoFilter==="Instalación")&&instalacionesProjection&&(<KpiCard icon={TrendingUp} label="Proyección de cierre — Instalaciones" value={numFmt(Math.round(instalacionesProjection.proyeccion))} sub={`${numFmt(instalacionesProjection.realizadas)} realizadas · ${instalacionesProjection.tasaDiaria.toFixed(1)}/día`} accent="var(--amber)"/>)}
            {(tipoFilter==="todas"||tipoFilter==="Ticket")&&ticketsProjection&&(<KpiCard icon={TrendingUp} label="Proyección de cierre — Tickets" value={numFmt(Math.round(ticketsProjection.proyeccion))} sub={`${numFmt(ticketsProjection.realizados)} resueltos · ${ticketsProjection.tasaDiaria.toFixed(1)}/día`} accent="var(--signal)"/>)}
            {(tipoFilter==="todas"||tipoFilter==="Instalación")&&diasAtencionInst!==null&&(<KpiCard icon={Clock} label="Días prom. de atención — Instalaciones" value={diasAtencionInst.toFixed(1)} sub="Promedio días entre creación y atención (realizadas)" accent="var(--signal)"/>)}
            {(tipoFilter==="todas"||tipoFilter==="Ticket")&&diasAtencionTick!==null&&(<KpiCard icon={Clock} label="Días prom. de atención — Tickets" value={diasAtencionTick.toFixed(1)} sub="Promedio días entre creación y atención (realizados)" accent="var(--amber)"/>)}
          </div>)}
          <div className="chart-grid">
            <ChartCard title="Promedio diario de órdenes realizadas por tipo" height={300}><PieChart margin={{top:10,right:10,bottom:10,left:10}}><Pie data={promedioDiarioData} dataKey="value" nameKey="name" innerRadius="55%" outerRadius="85%" paddingAngle={2}><Cell fill="var(--signal)"/><Cell fill="var(--amber)"/></Pie><Tooltip contentStyle={tooltipStyle} formatter={(v,n,e)=>[`${v.toFixed(1)}/día · ${e.payload.pct.toFixed(0)}%`,n]}/><Legend verticalAlign="bottom" align="center" wrapperStyle={{fontSize:12.5,paddingTop:12}} formatter={(value,e)=>{const d=e&&e.payload?e.payload:{name:value,value:0,pct:0};return d.name+" — "+(d.value||0).toFixed(1)+"/día ("+(d.pct||0).toFixed(0)+"%)"; `${d.name} — ${d.value.toFixed(1)}/día (${d.pct.toFixed(0)}%)`;}}/></PieChart></ChartCard>
            <ChartCard title="Cumplimiento por tipo de orden"><BarChart data={tipoBreakdown}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/><XAxis dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={40}/><Tooltip contentStyle={tooltipStyle}/><Legend wrapperStyle={{fontSize:12}}/><Bar dataKey="realizado" name="Realizado" fill="var(--signal)" radius={[3,3,0,0]}/><Bar dataKey="no_realizado" name="No realizado" fill="var(--critical)" radius={[3,3,0,0]}/></BarChart></ChartCard>
            <div className="chart-card" style={{gridColumn:"1 / -1"}}><div className="chart-title">{`Evolución diaria — Órdenes por día (${currentMonthLabel})`}</div><ResponsiveContainer width="100%" height={360}><BarChart data={dailyOrdersData} margin={{top:10,right:10,bottom:40,left:10}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/><XAxis dataKey="label" stroke="var(--text-dim)" fontSize={11} tickLine={false} interval={0} angle={-40} textAnchor="end"/><YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={40} label={{value:"Órdenes",angle:-90,position:"insideLeft",fill:"var(--text-dim)",fontSize:11}}/><Tooltip contentStyle={tooltipStyle}/><Legend wrapperStyle={{fontSize:12}}/>{(tipoFilter==="todas"||tipoFilter==="Instalación")&&(<Bar dataKey="Instalación" name="Instalación" stackId="dia" fill="var(--signal)" radius={tipoFilter==="Instalación"?[3,3,0,0]:[0,0,0,0]}><LabelList dataKey="Instalación" position="inside" fill="#FFF" fontSize={11} formatter={v=>v?v:""}/></Bar>)}{(tipoFilter==="todas"||tipoFilter==="Ticket")&&(<Bar dataKey="Ticket" name="Ticket" stackId="dia" fill="var(--amber)" radius={[3,3,0,0]}><LabelList dataKey="Ticket" position="inside" fill="#FFF" fontSize={11} formatter={v=>v?v:""}/></Bar>)}</BarChart></ResponsiveContainer></div>
            <ChartCard title="Volumen por zona (top 8)" height={300}><BarChart data={zonaData} layout="vertical" margin={{left:8}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={110}/><Tooltip contentStyle={tooltipStyle}/><Legend wrapperStyle={{fontSize:12}}/><Bar dataKey="realizado" name="Realizado" stackId="z" fill="var(--signal)" radius={[0,3,3,0]}/><Bar dataKey="no_realizado" name="No realizado" stackId="z" fill="var(--critical)" radius={[0,3,3,0]}/></BarChart></ChartCard>
            <ChartCard title="Técnicos con más órdenes completadas (top 8)" height={300}><BarChart data={tecnicoData} layout="vertical" margin={{left:8}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={120}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Completadas"]}/><Bar dataKey="value" name="Completadas" fill="var(--signal)" radius={[0,3,3,0]}/></BarChart></ChartCard>
            <ChartCard title="Principales motivos de no cumplimiento (top 8)" height={300}><BarChart data={motivoData} layout="vertical" margin={{left:8}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={150}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Casos"]}/><Bar dataKey="value" name="Casos" fill="var(--amber)" radius={[0,3,3,0]}/></BarChart></ChartCard>
            {imposibilidadData.length>0&&(<ChartCard title="Motivos de imposibilidad técnica (top 8)" height={300}><BarChart data={imposibilidadData} layout="vertical" margin={{left:8}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" horizontal={false}/><XAxis type="number" stroke="var(--text-dim)" fontSize={11} tickLine={false}/><YAxis type="category" dataKey="name" stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={160}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[v,"Casos"]}/><Bar dataKey="value" name="Casos" fill="var(--critical)" radius={[0,3,3,0]}/></BarChart></ChartCard>)}
            <div className="chart-card" style={{gridColumn:"1 / -1"}}><div className="chart-title">Cumplimiento por tipo de orden — Últimos 3 meses (%)</div><ResponsiveContainer width="100%" height={280}><BarChart data={cumplimiento3MesesData} margin={{top:10,right:20,bottom:10,left:10}}><CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false}/><XAxis dataKey="mes" stroke="var(--text-dim)" fontSize={12} tickLine={false}/><YAxis stroke="var(--text-dim)" fontSize={11} tickLine={false} axisLine={false} width={36} domain={[0,100]} tickFormatter={v=>`${v}%`}/><Tooltip contentStyle={tooltipStyle} formatter={v=>[`${v}%`,"Cumplimiento"]}/><Legend wrapperStyle={{fontSize:12}}/>{(tipoFilter==="todas"||tipoFilter==="Instalación")&&<Bar dataKey="Instalación" name="Instalación" fill="var(--signal)" radius={[4,4,0,0]}><LabelList dataKey="Instalación" position="top" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar>}{(tipoFilter==="todas"||tipoFilter==="Ticket")&&<Bar dataKey="Ticket" name="Ticket" fill="var(--amber)" radius={[4,4,0,0]}><LabelList dataKey="Ticket" position="top" fontSize={11} fill="var(--text-muted)" formatter={v=>`${v}%`}/></Bar>}</BarChart></ResponsiveContainer></div>
          </div>
        </>
      )}
    </div>
        )}
      </div>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
